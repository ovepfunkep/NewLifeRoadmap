name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Полная история — иначе `git rev-list --count` даёт 1 и версия в UI не меняется.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Vite base: / для репозитория owner.github.io, иначе /имя-репо/ (иначе в проде грузится «сырой» index и 404 на /src/main.tsx).
      - name: Resolve Vite base for GitHub Pages
        id: pages_base
        shell: bash
        run: |
          owner="${{ github.repository_owner }}"
          repo="${{ github.repository }}"
          name="${repo#*/}"
          if [[ "$name" == "${owner}.github.io" ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
            echo "Vite base: / (user or org site repo)"
          else
            echo "base=/${name}/" >> "$GITHUB_OUTPUT"
            echo "Vite base: /${name}/ (project repo)"
          fi

      - name: Build
        env:
          GITHUB_PAGES_BASE: ${{ steps.pages_base.outputs.base }}
          # Firebase configuration (из GitHub Secrets)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_APP_CHECK_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_FIREBASE_APP_CHECK_RECAPTCHA_SITE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          echo "Building with base path: $GITHUB_PAGES_BASE"
          npm run build

      - name: Verify production bundle (not dev index.html)
        run: |
          if grep -qE 'src/main\.tsx|/src/main' dist/index.html; then
            echo '::error::dist/index.html still references Vite dev entry — deploy aborted.'
            exit 1
          fi
          if ! grep -qE 'assets/.*\.(js|mjs)' dist/index.html; then
            echo '::error::dist/index.html must reference a hashed assets/*.js bundle.'
            exit 1
          fi
          echo 'OK: dist/index.html is a Vite production build.'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

