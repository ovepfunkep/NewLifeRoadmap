name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Assert Firestore config present
        run: test -f firestore.rules && test -f firebase.json

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify
